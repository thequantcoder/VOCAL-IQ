# Day 62 — Workers Deployment + HPA. Scales on BullMQ queue depth (custom metric) so campaigns,
# transcription, and scoring drain under load.
apiVersion: apps/v1
kind: Deployment
metadata: { name: vocaliq-workers, labels: { app: vocaliq-workers } }
spec:
  replicas: 2
  selector: { matchLabels: { app: vocaliq-workers } }
  template:
    metadata: { labels: { app: vocaliq-workers } }
    spec:
      containers:
        - name: workers
          image: ghcr.io/vocaliq/workers:latest
          envFrom: [{ secretRef: { name: vocaliq-secrets } }]
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: vocaliq-workers }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: vocaliq-workers }
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: Pods
      pods:
        metric: { name: vocaliq_queue_depth }
        target: { type: AverageValue, averageValue: "100" }
